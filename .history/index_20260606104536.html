<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | PG Life</title>
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/all.min.css" rel="stylesheet"/>
    <link href="css/common.css" rel="stylesheet" />
    <link href="css/home.css" rel="stylesheet" />
</head>
<body>


<div class="header sticky-top">
    <nav class="navbar navbar-expand-md navbar-light">
        <a class="navbar-brand" href="index.html">
            <img src="img/images/logo.jpeg" />
        </a>

        <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#my-navbar">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="my-navbar">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="#">
                        <i class="fas fa-user"></i> Signup
                    </a>
                </li>
                <div class="nav-vl"></div>
                <li class="nav-item">
                    <a class="nav-link" href="#" data-toggle="modal" data-target="#login-modal">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </a>
                </li>
            </ul>
        </div>
    </nav>
</div>


<div class="banner-container">
    <h2 class="white pb-3">Happiness per Square Foot</h2>
    <form id="search-form">
        <div class="input-group city-search">
            <input type="text" class="form-control input-city" id="city" placeholder="Enter your city to search for PGs"/>
            <div class="input-group-append">
                <button type="submit" class="btn btn-secondary">
                    <i class="fa fa-search"></i>
                </button>
            </div>
        </div>
    </form>
</div>


<div class="page-container">
    <h1 class="city-heading">Major Cities</h1>
    <div class="row">

        <div class="city-card-container col-md">
            <a href="property_list.html">
                <div class="city-card rounded-circle">
                    <img src="img/images/delhi.jpeg" class="city-img" alt="Delhi"/>
                </div>
            </a>
        </div>

        <div class="city-card-container col-md">
            <a href="property_list.html">
                <div class="city-card rounded-circle">
                    <img src="img/images/mumbai.jpeg" class="city-img" alt="Mumbai"/>
                </div>
            </a>
        </div>

        <div class="city-card-container col-md">
            <a href="property_list.html">
                <div class="city-card rounded-circle">
                    <img src="img/images/bangalore.jpeg" class="city-img" alt="Bangalore"/>
                </div>
            </a>
        </div>

        <div class="city-card-container col-md">
            <a href="property_list.html">
                <div class="city-card rounded-circle">
                    <img src="img/images/hyderabad.jpeg" class="city-img" alt="Hyderabad"/>
                </div>
            </a>
        </div>

    </div>
</div>


<div class="modal fade" id="login-modal" tabindex="-1" role="dialog" aria-labelledby="login-heading" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered" role="document">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="login-heading">Login with PGLife</h5>
                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
            <div class="modal-body">
                <form id="login-form" class="form" role="form">
                    <div class="input-group form-group mb-3">
                        <div class="input-group-prepend">
                            <span class="input-group-text"><i class="fas fa-user"></i></span>
                        </div>
                        <input type="email" class="form-control" name="email" placeholder="Email" required>
                    </div>
                    <div class="input-group form-group mb-3">
                        <div class="input-group-prepend">
                            <span class="input-group-text"><i class="fas fa-lock"></i></span>
                        </div>
                        <input type="password" class="form-control" name="password" placeholder="Password" minlength="6" required>
                    </div>
                    <div class="form-group">
                        <button type="submit" class="btn btn-block btn-primary">Login</button>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <span>
                    <a href="#">Click here</a> to register a new account
                </span>
            </div>
        </div>
    </div>
</div>

<div class="footer">
    <div class="page-container footer-container">
        <div class="footer-cities">
            <div class="footer-city"><a href="property_list.html">PG in Delhi</a></div>
            <div class="footer-city"><a href="property_list.html">PG in Mumbai</a></div>
            <div class="footer-city"><a href="property_list.html">PG in Bangalore</a></div>
            <div class="footer-city"><a href="property_list.html">PG in Hyderabad</a></div>
        </div>
        <div class="footer-copyright">© 2020 Copyright PG Life</div>
    </div>
</div>

<script src="js/jquery.js"></script>
<script src="js/bootstrap.min.js"></script>
</body>
</html>
