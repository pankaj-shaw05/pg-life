<html lang="en">

<body>
    <div class="header sticky-top">
        <nav class="navbar navbar-expand-md navbar-light">
            <a class="navbar-brand" href="index.html">
                <img src="img/images/logo.jpeg" />
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#my-navbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="my-navbar">
                <ul class="navbar-nav">
                    <div class='nav-name'>
                        Hi, Aditya sood
                        </div>
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html">
                                <i class="fas fa-user"></i>Dashboard
                            </a>
                        </li>
                        <div class="nav-vl"></div>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <i class="fas fa-sign-out-alt"></i>Logout
                           </a>
                    </li>
                </ul> 
            </div>
        </nav>  
    </div>

    <div id="loading">
    </div>

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb pay-2">
            <li class="breadcrumb-item">
                <a href="index.html">Home</a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">
                Dashboard
            </li>
        </ol>
    </nav>

    <div class="my-profile page-container">
        <h1>My profile</h1>
        <div class="row">
            <div class="col-md-3 profile-img-container">
                <i class="fas fa-user profile-img"></i>
            </div>
        </div>

        <div class="col-md-9">
            <div class="row no-gutters justify-content-between align-items-end">

                <div class="profile">
                    <div class="name">Aditya Sood</div>
                    <div class="email">aditya@gmail.com</div>
                    <div class="phone">9876543210</div>
                    <div class="college">ABC College</div>
                </div>

                <div class="edit">
                    <div class="edit-profile">Edit Profile</div>
                </div>

            </div>
        </div>
    </div>
</div>


<div class="my-interested-properties">
    <div class="page-container">

        <h1>My Interested Properties</h1>

        <div class="property-card row">

            <div class="image-container col-md-4">
                <img src="img/property_1.jpg" alt="Property Image">
            </div>

            <div class="content-container col-md-8">

                <div class="row no-gutters justify-content-between">

                    <div class="star-container">
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="fas fa-star"></i>
                        <i class="far fa-star"></i>
                    </div>

                    <div class="interested-container">
                        <i class="fas fa-heart"></i>
                        <div class="interested-text">
                            Interested
                        </div>
                    </div>

                </div>

                <div class="detail-container">

                    <div class="property-name">
                        Ganpati Paying Guest
                    </div>

                    <div class="property-address">
                        Police Beat, SV Road, Borivali East,
                        Mumbai - 400066
                    </div>

                    <div class="property-gender">
                        <img src="img/male.png" alt="">
                    </div>

                </div>

                <div class="row no-gutters">

                    <div class="rent-container col-6">
                        <div class="rent">₹ 8,500/-</div>
                        <div class="rent-unit">per month</div>
                    </div>

                    <div class="button-container col-6">
                        <a href="#" class="btn btn-primary">
                            View
                        </a>
                    </div>

                </div>

            </div>

        </div>

    </div>
</div>
<script src="js/query.min.js"></script>
<script src="js/bootstrap.min.js"></script>
