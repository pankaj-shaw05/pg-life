<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | PG Life</title>

    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/common.css" rel="stylesheet" />
    <link href="css/dashboard.css" rel="stylesheet"/>
</head>


<body>
    <div class="header sticky-top">
        <nav class="navbar navbar-expand-md navbar-light">
            <a class="navbar-brand" href="index.html">
                <img src="img/images/logo.jpeg" />
            </a>
            <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#my-navbar">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse justify-content-end" id="my-navbar">
                <ul class="navbar-nav">
                    <div class='nav-name'>
                        Hi, Aditya sood
                        </div>
                        <li class="nav-item">
                            <a class="nav-link" href="dashboard.html">
                                <i class="fas fa-user"></i>Dashboard
                            </a>
                        </li>
                        <div class="nav-vl"></div>
                        <li class="nav-item">
                            <a class="nav-link" href="#">
                                <i class="fas fa-sign-out-alt"></i>Logout
                           </a>
                    </li>
                </ul> 
            </div>
        </nav>  
    </div>

    <div id="loading">
    </div>

    <nav aria-label="breadcrumb">
        <ol class="breadcrumb pay-2">
            <li class="breadcrumb-item">
                <a href="index.html">Home</a>
            </li>
            <li class="breadcrumb-item active" aria-current="page">
                Dashboard
            </li>
        </ol>
    </nav>

    <div class="my-profile page-container">
        <h1>My profile</h1>
        <div class="row">
            <div class="col-md-3 profile-img-container">
                <i class="fas fa-user profile-img"></i>
            </div>
        </div>
    
        <div class="col-md-6">
            <div class="name">Aditya Sood</div>
            <div>aditya@gmail.com</div>
            <div>9876543210</div>
            <div>ABC College</div>
        </div>

        <div class="col-md-3 text-md-right">
            <a href="#" class="edit-profile">Edit Profile</a>
        </div>
    </div>
</div>


<div class="my-interested-properties page-container">
    <h1>My Interested Properties</h1>

    <div class="property-card">
        <div class="row">

            <div class="col-md-3 image-container">
                <img src="img/property_1.jpg" alt="Property Image">
            </div>

            <div class="col-md-7 detail-container">

                <div class="star-container">
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                    <i class="fas fa-star"></i>
                </div>

                <div class="property-name">
                    Ganpati Paying Guest
                </div>

                <div class="property-address">
                    Police Beat, Santhia Complex, SV Road,
                    Borivali East, Mumbai - 400066
                </div>

                <div class="property-gender">
                    <img src="img/images/male.jpeg">
                    <img src="img/images/female.jpeg">
                </div>

                <div class="rent-container">
                    <div class="rent">Rs 8,500/-</div>
                    <div class="rent-unit">per month</div>
                    <img src="img/images/properties.jpeg">
                    
                </div>
            </div>

            <div class="col-md-2 interested-container">

                <i class="fas fa-heart"></i>
                <div class="interested-text">
                    Interested
                </div>

                <div class="button-container mt-3">
                    <a href="#" class="btn btn-info">
                        View
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

<script src="js/query.min.js"></script>
<script src="js/bootstrap.min.js"></script>

</body>
</html>
