        <form id="search-form">

     <div class="page-container">

        </h1>
        <div class="row">
            <div class="city-card-container col-md">
                <a href="property_list.html">

                    </div>

        </div>
    </div>

    <div class="modal fade" id="signup-modal" tabindex="-1" role="dialog" aria-labelledby="signup-heading" aria-hidden="true">
        <div class="modal-dialog" role="document">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="signup-heading">Signup with PGLife</h5>
                    <button type="button" class="close" data-dismiss="modal" aria-label="close">
                       <span aria-hidden="true">&times;</span> 
                    </button>
                </div>

                <div class="modal-body">
                    <form id="signup-form" class="form" role="form">
                        <div class="input-group from-group">
                            <div class="input-group-prepend">
                                <span class="input-group-text">
                                    <i class="fas fa-user"></i>
                                    </span>
                                </div>  
                                <input type="text" class="form-control" name="full_name" placeholder="Full Name" maxlength="30" required>
                            </div>

                            <div class="input-group from-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <i class="fas fa-phone-alt"></i>
                                    </span>
                                </div>
                                <input type="text" class="form-control" name="phone" placeholder="Phone Number" maxlength="10" minlegth="30" required>
                            </div>

                            <div class="input-group form-group">
                            <div class="input-group-prepend">
                                 <span class="input-group-text">
                                     <i class="fas fa-envelope"></i>
                                </span> 
                            </div>
                            <input type="email" class="form-control" name="email" placeholder="Email" required>
                        </div>

                        <div class="input-group form-group">
                             <div class="input-group-prepend">
                                  <span class="input-group-text">
                                      <i class="fas fa-lock"></i>
                                   </span>
                                </div>
                                <input type="password" class="form-control" name="password" placeholder="Password" minlength="6" required>
                            </div>

                            <div class="input-group form-group">
                                <div class="input-group-prepend">
                                    <span class="input-group-text">
                                        <i class="fas fa-university"></i>
                                    </span>
                                <div>
                                    <input type="password" class="form-control" name="college_name" placeholder="College Name" maxlength="150" required>
                                </div>

                                <div class="form-group">
                                    <span>I'm a</span>
                                    <input type="radio" class="ml-3" id="gender-male" name="gender" value="male" /> Male
                                    <label for="gender-male">
                                    </label>
                                    <input type="radio" class="ml-3" id="gender-female" name="gender" value="female" />
                                    <label for="gender-female">
                                      Female                               
                                    </label>
                                </div>
                                <div class="form-group">
                                    <button type="submit" class="btn btn-block btn-primary">Create Account</button>
                                </div>
                            </form>
                        </div>

                        <div class="modal-footer">
                            <span>Already have an account?
                                <a href="#" data-dismiss="modal" data-toggle="modal" data-target="#login-modal">Login</a>
                            </span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal fade" id="login-modal" tabindex="-1" role="dialog" aria-labelledby="login-heading" aria-hidden="true">
                <div class="modal-dialog modal-dialog-centered" role="document">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title" id="login-heading" Login with PGLife/h5>
                                <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                    <span aria-hidden="true">&times;</span>
                                </button>
                            </div>

                            <div class="modal-body">
                                <form id="login-form" class="form" role="form">
                                    <div class="input-group form-group">
                                        <div class="input-group-prepend">
                                            <span class="input-group-text">
                                                <i class="fas fa-user"></i>
                                            </span>
                                        <div>
                                            <input type="email" class="form-control" name="email" placeholder="Email" required>
                                        </div>

                                        <div class="input-group form-group">
                                            <div class="input-group-prepend">
                                                <span class="input-group-text">
                                                    <i class="fas fa-lock"></i>
                                                </span>
                                            </div>
                                            <input type="password" class="form-control" name="password" placeholder="Password" minlength="6" required>
                                        </div>

                                        <div class="form-group">
                                            <button type="submit" class="btn btn-block btn-primary"> Login</button>
                                        </div>
                                    </form>
                                </div>        

                                <div class="modal-footer">
                                    <span>
                                        <a href="#" data-dismiss="modal" data-toggle="modal" data-target="#signup-modal">Click here</a>
                                        to register a new account
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="footer">
                        <div class="page-container footer-container">
                            <div class="footer-cities">
                                <div class="footer-city">
                                    <a href="property_list.html">PG in Delhi</a>
                                </div>
                                <div class="footer-city">
                                    <a href="property_list.html">PG in Mumbai</a>
                                </div>
                                <div class="footer-city">

                                </div>
                                <div class="footer-city">
                                    <a href="property_list.html">PG in Hyderabad</a>
                                </div>
                            </div>
                            <div class="footer-copyright">© 2020 Copyright PG Life </div>
                        </div>
                    </div>

                    <script type="text/javascript" src="js/jquery.js"></script>
                    <script type="text/javascript" src="js/bootstrap.min.js"></script>
